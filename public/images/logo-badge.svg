<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <rect x="20" y="20" width="280" height="140" rx="16" fill="#edeae4" stroke="#5c6b5e" stroke-width="2"/>
  <rect x="28" y="28" width="264" height="124" rx="12" fill="#edeae4" stroke="#5c6b5e" stroke-width="1" opacity="0.3"/>
  <!-- Stars -->
  <circle cx="60" cy="16" r="2" fill="#5c6b5e" opacity="0.5"/>
  <circle cx="160" cy="10" r="2.5" fill="#5c6b5e" opacity="0.4"/>
  <circle cx="260" cy="16" r="2" fill="#5c6b5e" opacity="0.5"/>
  <circle cx="100" cy="22" r="1.5" fill="#b8955c" opacity="0.4"/>
