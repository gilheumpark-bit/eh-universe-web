name: E2E
# Playwright E2E CI 게이트 (활성).
#   - chromium만으로도 실제 런타임 ~6~10분 예상 (build 포함).
#   - main push/PR에서 회귀 차단. 비용 고려 시 pull_request 한정으로 좁힐 수 있음.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 최소 권한: Playwright E2E는 읽기만 필요 (CodeQL actions/missing-workflow-permissions)
permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build (prod)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run E2E
        run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
