name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: License summary (claude3 _dependencies)
        # 의존성 라이선스 가시화. 강한 copyleft(GPL/AGPL-only) 유입 감시 — THIRD_PARTY_NOTICES.md 참조.
        # informational (dual-license 오탐 회피). 실패해도 CI 차단 X.
        run: npx --yes license-checker --production --summary || true

      - name: Null byte scan
        run: |
          BAD=$(find src -name '*.ts' -o -name '*.tsx' | xargs grep -Pl '\x00' 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "❌ Null bytes detected in:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ No null bytes found"

      - name: Lint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit --strict

      - name: Critical path tests
        run: npx jest --testPathPatterns="verification|composer-state|panel-registry|rate-limit|safe-fix|logger|server-ai" --no-coverage

      - name: Run tests with coverage
        # Coverage threshold: single source of truth in jest.config.ts (30/30/40/40 global).
        # Removed inline override (was 15/15/20/20) to keep CI ↔ local in sync — 2026-05-11.
        run: npx jest --coverage

      # ============================================================
      # [루프 4 P1 — 2026-06-08] claude3 외부 표준 compliance audit
      # _testing: Test Pyramid 70/20/10 비율 자동 산출.
      # unit (__tests__) / integration (integration|e2e in path) / e2e (playwright) 카운트.
      # 위반 시 경고 only (informational) — 단계적 강제로 점진 이행.
      # ============================================================
      - name: Test Pyramid 70/20/10 audit (informational)
        run: |
          UNIT=$(find src -path '*__tests__*' -name '*.test.ts' -o -path '*__tests__*' -name '*.test.tsx' | wc -l)
          INTEG=$(find src -path '*integration*' -name '*.test.ts' | wc -l)
          E2E=$(find e2e -name '*.spec.ts' 2>/dev/null | wc -l)
          TOTAL=$((UNIT + INTEG + E2E))
          echo "## Test Pyramid Audit (claude3 _testing 70/20/10)" >> $GITHUB_STEP_SUMMARY
          echo "| Tier | Count | Target | Actual % |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------:|-------:|---------:|" >> $GITHUB_STEP_SUMMARY
          if [ $TOTAL -gt 0 ]; then
            UPCT=$((UNIT*100/TOTAL))
            IPCT=$((INTEG*100/TOTAL))
            EPCT=$((E2E*100/TOTAL))
            echo "| Unit | $UNIT | 70% | $UPCT% |" >> $GITHUB_STEP_SUMMARY
            echo "| Integration | $INTEG | 20% | $IPCT% |" >> $GITHUB_STEP_SUMMARY
            echo "| E2E | $E2E | 10% | $EPCT% |" >> $GITHUB_STEP_SUMMARY
            echo "Total: $TOTAL test files"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        run: npm run build

      - name: Build size report
        run: |
          echo "## Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/ 2>/dev/null || echo "static: N/A"
          du -sh .next/static/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          find .next/static -name '*.js' -exec du -sh {} \; | sort -rh | head -10 >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Total JS chunks:"
          find .next/static -name '*.js' | wc -l

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
