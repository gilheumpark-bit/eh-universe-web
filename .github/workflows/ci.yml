name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Null byte scan
        run: |
          BAD=$(find src -name '*.ts' -o -name '*.tsx' | xargs grep -Pl '\x00' 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "❌ Null bytes detected in:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ No null bytes found"

      - name: Lint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit --strict

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Build size report
        run: |
          echo "## Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/ 2>/dev/null || echo "static: N/A"
          du -sh .next/static/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          find .next/static -name '*.js' -exec du -sh {} \; | sort -rh | head -10 >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Total JS chunks:"
          find .next/static -name '*.js' | wc -l

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
