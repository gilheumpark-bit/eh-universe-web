name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Null byte scan
        run: |
          BAD=$(find src -name '*.ts' -o -name '*.tsx' | xargs grep -Pl '\x00' 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "❌ Null bytes detected in:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ No null bytes found"

      - name: Lint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit --strict

      - name: Critical path tests
        run: npx jest --testPathPatterns="verification|composer-state|panel-registry|rate-limit|safe-fix" --no-coverage

      - name: Run tests with coverage
        run: npx jest --coverage --coverageThreshold='{"global":{"branches":50,"functions":60,"lines":60,"statements":60}}'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        run: npm run build

      - name: Build size report
        run: |
          echo "## Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/ 2>/dev/null || echo "static: N/A"
          du -sh .next/static/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          find .next/static -name '*.js' -exec du -sh {} \; | sort -rh | head -10 >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Total JS chunks:"
          find .next/static -name '*.js' | wc -l

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
