name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Null byte scan
        run: |
          BAD=$(find src -name '*.ts' -o -name '*.tsx' | xargs grep -Pl '\x00' 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "❌ Null bytes detected in:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ No null bytes found"

      - name: TypeScript type check
        run: npx tsc --noEmit --strict

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
