name: Isolation §1 Check

# Enforces the 8 absolute forbidden files at 0-byte diff per PR.
# Also enforces twentyone-modules/* trade-secret separation:
#   - No rule pack data hardcoded in AGPL distribution
#   - No import from studio-types.ts back to twentyone-modules/* (circular guard)
#
# Triggered on every push to master and every PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  isolation-section-1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Determine base commit
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: 8 absolute forbidden files — 0byte diff
        run: |
          set -e
          FILES=(
            "src/lib/studio-types.ts"
            "src/components/studio/ManuscriptView.tsx"
            "src/components/studio/OriginBadge.tsx"
            "src/lib/origin-migration.ts"
            "src/components/studio/settings/AuditExportButton.tsx"
            "src/lib/markdown-serializer.ts"
            "src/lib/project-serializer.ts"
            "src/hooks/useOriginTracker.ts"
          )
          BASE="${{ steps.base.outputs.sha }}"
          VIOLATIONS=()
          for f in "${FILES[@]}"; do
            if [ -f "$f" ] && ! git diff --quiet "$BASE"..HEAD -- "$f"; then
              VIOLATIONS+=("$f")
            fi
          done
          # save-engine: 개별 파일 단위로 위반 기록 (blanket 와일드카드 금지 — 파일별 명시 승인 강제).
          while IFS= read -r sf; do
            [ -n "$sf" ] && VIOLATIONS+=("$sf")
          done < <(git diff --name-only "$BASE"..HEAD | grep '^src/lib/save-engine/' | grep -v '__tests__' || true)
          # BDFL override 로드 (.github/bdfl-isolation-override.txt)
          #   각 비주석 줄 = "<exact key>  # expires:YYYY-MM-DD". 만료일 필수 — 누락/만료 시 무효
          #   (일회성 예외가 영구 백도어로 굳는 것을 차단). 와일드카드 금지.
          BDFL_OVERRIDE=".github/bdfl-isolation-override.txt"
          ALLOWED_BY_BDFL=()
          TODAY=$(date -u +%Y-%m-%d)
          if [ -f "$BDFL_OVERRIDE" ]; then
            while IFS= read -r line; do
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ -z "${line// }" ]] && continue
              key="${line%%#*}"
              key="$(echo "$key" | sed -e 's/[[:space:]]*$//' -e 's/^[[:space:]]*//')"
              [ -z "$key" ] && continue
              if [[ "$line" =~ expires:([0-9]{4}-[0-9]{2}-[0-9]{2}) ]]; then
                exp="${BASH_REMATCH[1]}"
              else
                echo "⚠️  override 무시 (만료일 누락): $key"
                continue
              fi
              if [[ "$TODAY" > "$exp" ]]; then
                echo "⚠️  override 무시 (만료됨 $exp < $TODAY): $key"
                continue
              fi
              ALLOWED_BY_BDFL+=("$key")
            done < "$BDFL_OVERRIDE"
          fi
          FINAL_VIOLATIONS=()
          for v in "${VIOLATIONS[@]}"; do
            allowed=false
            for a in "${ALLOWED_BY_BDFL[@]}"; do
              [[ "$v" == "$a" ]] && allowed=true && break
            done
            $allowed || FINAL_VIOLATIONS+=("$v")
          done
          if [ ${#FINAL_VIOLATIONS[@]} -gt 0 ]; then
            echo "❌ Isolation §1 VIOLATION — these absolute-forbidden files changed:"
            printf '   - %s\n' "${FINAL_VIOLATIONS[@]}"
            echo ""
            echo "These files are pinned at 0-byte diff per Loreguard governance."
            echo "If the change is intentional, add exact paths to .github/bdfl-isolation-override.txt"
            echo "with a comment explaining BDFL approval (GOVERNANCE.md §2)."
            exit 1
          fi
          if [ ${#VIOLATIONS[@]} -gt 0 ]; then
            echo "⚠️  ${#VIOLATIONS[@]} forbidden file(s) changed — all covered by BDFL override:"
            printf '   - %s\n' "${VIOLATIONS[@]}"
          fi
          echo "✅ 8 forbidden files check passed"

  twentyone-modules-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: No rule pack data hardcoded in AGPL distribution
        run: |
          set -e
          # The 4-language webnovel module rule pack is trade-secret (CC-BY-NC-4.0).
          # Filenames must never appear in code/docs distributed under AGPL.
          if grep -r -E '21종\.md|webnovel_module_(EN|JP|ZH)|한국웹소설_21종모듈' \
              --include='*.ts' --include='*.tsx' --include='*.md' \
              src/ docs/ 2>/dev/null; then
            echo "❌ Trade-secret asset filename referenced in distributed code/docs"
            exit 1
          fi
          echo "✅ No trade-secret asset filenames in distributed sources"

      - name: No rule pack DATA hardcoded in twentyone-modules
        run: |
          set -e
          # twentyone-modules/*.ts may declare TypeScript interfaces only.
          # Concrete platform / beat / forbidden-code DATA must load via commercial license.
          if grep -E 'RULE_PACK_DATA\s*=|PLATFORM_RULES_18\s*=|BEAT_SEEDS_4LANG\s*=' \
              src/lib/twentyone-modules/*.ts 2>/dev/null; then
            echo "❌ Concrete rule pack data found in twentyone-modules/*.ts"
            echo "   Rule pack data is commercial-license-only and must NOT ship in AGPL build."
            exit 1
          fi
          echo "✅ twentyone-modules contains interfaces only — no rule pack data"

      - name: Single-direction import (twentyone-modules → studio-types only)
        run: |
          set -e
          # studio-types.ts must NOT import from twentyone-modules (circular guard).
          if grep -E "from\s+['\"]@?/?(\.\.?/)*lib/twentyone-modules" \
              src/lib/studio-types.ts 2>/dev/null; then
            echo "❌ Circular import — studio-types.ts imports from twentyone-modules"
            exit 1
          fi
          echo "✅ Single-direction import preserved"

      - name: Forbidden text in 4-language LIMITATION/ATTESTATION constants
        run: |
          set -e
          # Byte-level fixture for 4-language legal text — already enforced elsewhere,
          # but re-verified here so isolation check is the single PR-blocking gate.
          if [ -f "src/lib/creative-process/limitation-text.ts" ]; then
            grep -F "이 문서는 법적 효력을" src/lib/creative-process/limitation-text.ts > /dev/null \
              || { echo "❌ KO LIMITATION_TEXT byte-level fixture missing"; exit 1; }
          fi
          echo "✅ Legal text byte-level fixtures intact"
